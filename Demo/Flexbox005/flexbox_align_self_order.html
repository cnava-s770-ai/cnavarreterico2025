<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Align-Self and Order</title>
    <style>
        h1,
        h2 {
            text-align: center;
        }


        #container001 {
            border: 5px solid black;
            background-color: crimson;
            margin: 1rem;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            height: 700px;

        }

        .box {
            border: 1px solid black;
            background-color: lightgreen;
            width: 100px;
            height: 100px;
            padding: .5rem;
        }
        #one{
            background-color: white;
            order: 1;
            align-self: flex-end;
        }
        #two{
            background-color: darkred;
            order: 0;
        }
        #three{
            background-color: darkblue;
            order: 0;
        }
        #four{
            background-color: red;
            order: 2;
        }
        #five{
            background-color: blue;
            order: -1;
            align-self: flex-start;
        }

        @media screen and (min-width:800px) {

            body {
                background-color: lightslategrey;
            }

        }

        @media screen and (min-width:1000px) {

            body {
                background-color: brown;
            }

        }
    </style>
</head>

<body>
    <h1>Flexbox</h1>
    <h2>Align-Self and Order</h2>

    <h2>Container001</h2>
    <div id="container001">
        <div class="box" id="one">Item001</div>
        <div class="box" id="two">Item002</div>
        <div class="box" id="three">Item003</div>
        <div class="box" id="four">Item004</div>
        <div class="box" id="five">Item005</div>
    </div>

</body>

</html>
