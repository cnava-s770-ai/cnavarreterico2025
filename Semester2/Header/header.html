<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <style>
        /* Mobile First Design - Change colors when complete*/
        body {
            margin: 0;
            padding: 0;
        }

        #pageheader {
            background-color: antiquewhite;
            padding: 1rem;
            border-bottom: 1px solid silver;
        }

        #logo {
            width: 100px;
            height: 100px;
            background-color: rgb(227, 140, 25);
            border-radius: 50%;
            margin: auto;
            margin-bottom: 1rem;
            display: block;
        }

        #pageheader nav {
            /* background-color: rgb(244, 184, 104); */
            padding: 1rem;
            
        }

        #pageheader ul {
            background-color: none;
            list-style-type: none;
            padding: 0rem;
            display: flex;
            flex-direction: column;
            gap: .5rem;
            width: 80%;
            margin: auto;
        }

        #pageheader li {
            text-align: center;
            padding: 1rem;
            border: 1px solid silver;
            color: white;
            border-radius: .5rem;
            background-color: #F86F03;
        }

        /* Tablet and Desktop Design */
        @media screen and (min-width:700px)
        {
            #pageheader {
                display: flex;
                justify-content: space-between;
            }

            #logo {
                margin: 0;
            }

            #pageheader ul {
                flex-direction: row;
                width: 100;
            }
        }
    </style>
</head>

<body>
    <header id="pageheader">
    <img id="logo" src="Images/paws_logo.png" alt="Paws Logo">
        <nav>
            <ul>
                <li>Home</li>
                <li>Why Adopt</li>
                <li>Pet Gallery</li>
                <li>Testimonials</li>
            </ul>
        </nav>
    </header>
</body>
</html>
